# Smoke/dry-run model: a small multimodal model so the WHOLE pipeline
# (data -> collate -> train step -> eval) can be debugged in minutes without
# loading the 9B target. Same code path, different YAML.
#
# Qwen2-VL-2B is a good stand-in: same processor/chat-template family as Qwen VL,
# small enough to iterate fast. Swap for any small VLM you have cached.
name_or_path: Qwen/Qwen2-VL-2B-Instruct
modality: multimodal
attn_implementation: sdpa
torch_dtype: bfloat16
freeze_vision: true
gradient_checkpointing: true
trust_remote_code: false

quant:
  load_in_4bit: true
  bnb_4bit_quant_type: nf4
  bnb_4bit_use_double_quant: true
  bnb_4bit_compute_dtype: bfloat16

lora:
  r: 8
  lora_alpha: 16
  lora_dropout: 0.05
  bias: none
  target_modules: auto
  modules_to_save: []
  task_type: CAUSAL_LM
