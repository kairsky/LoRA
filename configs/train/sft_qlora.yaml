# SFT training hyper-parameters for QLoRA on a single RTX 5090 (32 GB).
# Effective batch = per_device_train_batch_size * gradient_accumulation_steps = 16.
output_dir: outputs
run_name: null

per_device_train_batch_size: 1
per_device_eval_batch_size: 1
gradient_accumulation_steps: 16

learning_rate: 2.0e-4
num_train_epochs: 3.0
max_steps: -1

optim: paged_adamw_8bit        # pages optimizer state to host RAM -> saves VRAM
lr_scheduler_type: cosine
warmup_ratio: 0.03
weight_decay: 0.0
max_grad_norm: 0.3

bf16: true
fp16: false

logging_steps: 10
eval_strategy: steps           # loss on the eval set during training
eval_steps: 100
save_steps: 100                # must stay a multiple of eval_steps for load_best
save_total_limit: 2
load_best_model_at_end: true   # keep the checkpoint with the lowest eval loss
metric_for_best_model: loss

# Generation-based metrics during training (json_valid_rate / field_f1 on a
# small eval slice). Set gen_eval_steps: 0 to disable.
gen_eval_steps: 100
gen_eval_samples: 8
gen_eval_batch_size: 4

dataloader_num_workers: 0      # 0 is safest on native Windows
report_to: ["tensorboard"]     # skipped automatically if not installed
seed: 42
