# SFT training hyper-parameters for QLoRA on a single RTX 5090 (32 GB).
# Effective batch = per_device_train_batch_size * gradient_accumulation_steps = 16.
output_dir: outputs
run_name: null

per_device_train_batch_size: 1
per_device_eval_batch_size: 1
gradient_accumulation_steps: 16

learning_rate: 2.0e-4
num_train_epochs: 3.0
max_steps: -1

optim: paged_adamw_8bit        # pages optimizer state to host RAM -> saves VRAM
lr_scheduler_type: cosine
warmup_ratio: 0.03
weight_decay: 0.0
max_grad_norm: 0.3

bf16: true
fp16: false

logging_steps: 10
eval_steps: 100
save_steps: 100
save_total_limit: 2

dataloader_num_workers: 0      # 0 is safest on native Windows
report_to: []                  # e.g. ["tensorboard"]
seed: 42
